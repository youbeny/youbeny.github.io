<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>几何伴学小助手 - 3D积木探险工坊</title>
    <!-- 使用 import map 指定模块来源 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', '幼圆', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #e8f5e8 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 3px solid #ffd54f;
            position: relative;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="%23ffd54f" opacity="0.1"/><circle cx="80" cy="40" r="1.5" fill="%234ecdc4" opacity="0.1"/><circle cx="60" cy="80" r="1" fill="%23ff6b6b" opacity="0.1"/></svg>');
            pointer-events: none;
        }
        
        .header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: white;
            padding: 25px;
            text-align: center;
            position: relative;
            border-bottom: 4px solid #ffd54f;
        }
        
        .header h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            color: #2c3e50;
            font-weight: bold;
        }
        
        .header p {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #34495e;
            font-weight: 600;
        }
        
        .shape-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap; /* 适应小屏幕 */
        }
        
        .shape-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border: 3px solid transparent;
        }
        
        .shape-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .shape-btn:hover::before {
            left: 100%;
        }
        
        .shape-btn.active {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            border-color: white;
        }
        
        .cube-btn { 
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%); 
            color: white; 
        }
        .cylinder-btn { 
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); 
            color: white; 
        }
        .cone-btn { 
            background: linear-gradient(135deg, #ffe66d 0%, #ffd93d 100%); 
            color: #2c3e50; 
        }
        /* 新增球体按钮样式 */
        .sphere-btn { 
            background: linear-gradient(135deg, #ab47bc 0%, #7b1fa2 100%); 
            color: white; 
        }
        
        .main-content {
            display: flex;
            height: 650px;
            gap: 0;
        }
        
        .design-panel {
            flex: 1;
            background: linear-gradient(135deg, #fff9e6 0%, #fff3e0 100%);
            padding: 25px;
            border-right: 4px dashed #ffb74d;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .view-panel {
            flex: 1.2;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            position: relative;
            border-left: 4px solid #bbdefb;
            min-height: 500px; /* 防止高度塌陷 */
        }
        
        .panel-title {
            text-align: center;
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            position: relative;
            padding-bottom: 10px;
        }
        
        .panel-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6b6b, transparent);
            border-radius: 2px;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            width: 350px;
            height: 350px;
            margin: 0 auto;
            border: 4px solid #ffb74d;
            padding: 10px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .grid-cell {
            background: linear-gradient(135deg, #fff9e6 0%, #ffecb3 100%);
            border: 2px solid #ffb74d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            color: #2c3e50;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        
        .grid-cell:hover {
            border-color: #ff6b6b;
            transform: scale(1.08);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #ffecb3 0%, #ffd54f 100%);
        }
        
        .grid-cell.active {
            animation: clickEffect 0.6s ease;
        }
        
        @keyframes clickEffect {
            0% { transform: scale(1); background: #fff9e6; }
            50% { transform: scale(0.9); background: #ffd54f; box-shadow: 0 0 20px #ff6b6b; }
            100% { transform: scale(1); background: linear-gradient(135deg, #fff9e6 0%, #ffecb3 100%); }
        }
        
        .controls {
            margin-top: 25px;
            text-align: center;
        }
        
        .control-btn {
            padding: 12px 25px;
            margin: 8px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid transparent;
        }
        
        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-color: white;
        }
        
        .instructions {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 1em;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 15px;
            border-left: 4px solid #4ecdc4;
        }
        
        .view-controls {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 2px solid #bbdefb;
            display: flex;
            justify-content: center;
            gap: 5px;
            min-width: 500px;
        }
        
        .view-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #78909c 0%, #546e7a 100%);
            color: white;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .view-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #546e7a 0%, #37474f 100%);
        }
        
        #threejs-canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 0 0 20px 0;
        }
        
        .feature-highlight {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #2c3e50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #4ecdc4;
        }
        
        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
                height: auto;
            }
            
            .design-panel {
                border-right: none;
                border-bottom: 4px dashed #ffb74d;
            }
            
            .view-panel {
                border-left: none;
                border-top: 4px solid #bbdefb;
                height: 500px;
            }
            
            .view-controls {
                min-width: 400px;
                flex-wrap: wrap;
                gap: 3px;
            }
            
            .view-btn {
                padding: 6px 8px;
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 3D几何积木探险工坊 🎨</h1>
            <p>小探险家，用你的创意搭建神奇的3D世界！</p>
            <div class="shape-buttons">
                <!-- 注意：onclick 中传入 this 以便操作按钮样式 -->
                <button class="shape-btn cube-btn active" onclick="switchShape('cube', this)">🎲 正方体</button>
                <button class="shape-btn cylinder-btn" onclick="switchShape('cylinder', this)">🥫 圆柱体</button>
                <button class="shape-btn cone-btn" onclick="switchShape('cone', this)">🍦 圆锥体</button>
                <!-- 新增球体按钮 -->
                <button class="shape-btn sphere-btn" onclick="switchShape('sphere', this)">⚽ 球体</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="design-panel">
                <div class="panel-title">✨ 我的创意设计工坊 ✨</div>
                <div class="grid-container" id="design-grid">
                    <!-- 5x5网格将通过JavaScript生成 -->
                </div>
                <div class="controls">
                    <button class="control-btn" onclick="clearDesign()">🧹 清空设计</button>
                </div>
                <div class="instructions">
                    💡 <strong>操作指南：</strong><br>
                    点击格子搭建积木 → 再次点击叠加 → 最多6层！<br>
                    切换形状可以创建不同风格的建筑哦！
                </div>
            </div>
            
            <div class="view-panel">
                <div class="view-controls">
                    <button class="view-btn" onclick="setView('front')">👁️ 正面</button>
                    <button class="view-btn" onclick="setView('back')">👁️ 后面</button>
                    <button class="view-btn" onclick="setView('right')">👁️ 右面</button>
                    <button class="view-btn" onclick="setView('left')">👁️ 左面</button>
                    <button class="view-btn" onclick="setView('top')">👁️ 上面</button>
                    <button class="view-btn" onclick="setView('initial')">🔄 初始</button>
                    <button class="view-btn" onclick="toggleGrid()">🎯 底布</button>
                </div>
                <canvas id="threejs-canvas"></canvas>
                <div class="feature-highlight">
                    🎮 鼠标拖拽旋转 · 滚轮缩放
                </div>
            </div>
        </div>
    </div>

    <!-- 使用 type="module" 确保现代浏览器兼容性 -->
    <script type="module">
        // 导入 Three.js 核心库和插件
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 全局变量 ---
        let scene, camera, renderer, controls;
        let currentShape = 'cube';
        let gridVisible = true;
        let groundGrid = null;
        const blocksGroup = new THREE.Group(); // 专门存放积木的组
        
        // 每个格子的数据：层数和每层使用的形状
        const gridData = Array(5).fill().map(() => Array(5).fill().map(() => ({
            levels: 0,
            shapes: [] // 每层存储使用的形状
        })));
        
        // 颜色配置（按层数）
        const levelColors = [
            0xff6b6b, // 第1层：橙色
            0x4ecdc4, // 第2层：蓝色
            0x66bb6a, // 第3层：绿色
            0xffa726, // 第4层：橙色
            0xffd54f, // 第5层：黄色
            0xab47bc  // 第6层：紫色
        ];
        
        // --- 将需要在全局调用的函数挂载到 window ---
        window.switchShape = function(shape, btnElement) {
            currentShape = shape;
            // 更新按钮激活状态
            document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        };
        
        window.clearDesign = function() {
            // 重置所有格子数据
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    gridData[row][col].levels = 0;
                    gridData[row][col].shapes = [];
                }
            }
            
            // 更新网格显示
            document.querySelectorAll('.grid-cell').forEach(cell => {
                cell.textContent = '0';
            });
            
            // 更新3D场景
            update3DScene();
        };
        
        window.setView = function(viewType) {
            if (!controls || !camera) return;
            
            // 临时禁用控制，避免视角切换时的冲突
            controls.enabled = false;
            
            switch(viewType) {
                case 'front':
                    camera.position.set(2.5, 2.5, 10);
                    camera.lookAt(2.5, 2.5, 0);
                    break;
                case 'back':
                    camera.position.set(2.5, 2.5, -10);
                    camera.lookAt(2.5, 2.5, 5);
                    break;
                case 'right':
                    camera.position.set(10, 2.5, 2.5);
                    camera.lookAt(0, 2.5, 2.5);
                    break;
                case 'left':
                    camera.position.set(-10, 2.5, 2.5);
                    camera.lookAt(5, 2.5, 2.5);
                    break;
                case 'top':
                    camera.position.set(2.5, 10, 2.5);
                    camera.lookAt(2.5, 0, 2.5);
                    break;
                case 'initial':
                default:
                    camera.position.set(2.5, 8, 8);
                    camera.lookAt(2.5, 0, 2.5);
                    break;
            }
            
            // 更新控制器的目标点
            controls.target.set(2.5, 0, 2.5);
            controls.update();
            
            // 短暂延迟后重新启用控制
            setTimeout(() => {
                controls.enabled = true;
            }, 100);
        };
        
        window.toggleGrid = function() {
            gridVisible = !gridVisible;
            if (groundGrid) {
                groundGrid.visible = gridVisible;
            }
        };
        
        // --- Three.js 初始化 ---
        function initThreeJS() {
            const canvas = document.getElementById('threejs-canvas');
            
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe3f2fd);
            
            // 将积木组添加到场景
            scene.add(blocksGroup);
            
            // 创建相机 (先获取有效宽高比)
            const width = canvas.clientWidth || 1;
            const height = canvas.clientHeight || 1;
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
            setInitialView();
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);
            
            // 创建地面网格
            createGroundGrid();
            
            // 设置轨道控制（实现360度自由旋转）
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 5;
            controls.maxDistance = 20;
            controls.maxPolarAngle = Math.PI;
            controls.target.set(2.5, 0, 2.5);
            controls.update();
            
            // 响应窗口大小变化
            window.addEventListener('resize', onWindowResize);
            
            // 开始动画循环
            animate();
        }
        
        function setInitialView() {
            camera.position.set(2.5, 8, 8);
            camera.lookAt(2.5, 0, 2.5);
        }
        
        function createGroundGrid() {
            if (groundGrid) scene.remove(groundGrid);
            const gridHelper = new THREE.GridHelper(5, 5, 0x000000, 0x000000);
            gridHelper.position.set(2.5, 0, 2.5);
            scene.add(gridHelper);
            groundGrid = gridHelper;
            groundGrid.visible = gridVisible;
        }
        
        function onWindowResize() {
            const canvas = document.getElementById('threejs-canvas');
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            
            if (width === 0 || height === 0) return; // 避免无效尺寸
            
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        // --- 积木创建与更新（新增球体支持）---
        function createBlock(row, col, level, shapeType) {
            let geometry;
            const color = levelColors[(level - 1) % levelColors.length] || 0x888888;
            
            switch(shapeType) {
                case 'cube':
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                    break;
                case 'cylinder':
                    geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
                    break;
                case 'cone':
                    geometry = new THREE.ConeGeometry(0.5, 1, 32);
                    break;
                case 'sphere':
                    geometry = new THREE.SphereGeometry(0.5, 32, 16);
                    break;
                default:
                    geometry = new THREE.BoxGeometry(1, 1, 1);
            }
            
            const material = new THREE.MeshPhongMaterial({ 
                color: color,
                shininess: 60,
                specular: 0x222222
            });
            const block = new THREE.Mesh(geometry, material);
            
            // 设置位置：格子中心坐标
            block.position.set(col + 0.5, level - 0.5, row + 0.5);
            
            return block;
        }
        
        function update3DScene() {
            // 清空积木组
            while(blocksGroup.children.length) {
                blocksGroup.remove(blocksGroup.children[0]);
            }
            
            // 根据gridData创建所有积木
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = gridData[row][col];
                    for (let level = 1; level <= cell.levels; level++) {
                        const shapeType = cell.shapes[level - 1] || currentShape;
                        const block = createBlock(row, col, level, shapeType);
                        blocksGroup.add(block);
                    }
                }
            }
        }
        
        // --- 设计网格初始化 ---
        function initDesignGrid() {
            const gridContainer = document.getElementById('design-grid');
            gridContainer.innerHTML = '';
            
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.textContent = '0';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    cell.addEventListener('click', function() {
                        const r = parseInt(this.dataset.row);
                        const c = parseInt(this.dataset.col);
                        
                        // 添加点击动画
                        this.classList.add('active');
                        setTimeout(() => this.classList.remove('active'), 600);
                        
                        // 更新格子数据
                        const cellData = gridData[r][c];
                        if (cellData.levels < 6) {
                            cellData.levels++;
                            cellData.shapes[cellData.levels - 1] = currentShape;
                        } else {
                            cellData.levels = 0;
                            cellData.shapes = [];
                        }
                        
                        // 更新显示
                        this.textContent = cellData.levels.toString();
                        
                        // 更新3D场景
                        update3DScene();
                    });
                    
                    gridContainer.appendChild(cell);
                }
            }
        }
        
        // --- 启动一切 ---
        window.addEventListener('DOMContentLoaded', () => {
            initDesignGrid();
            initThreeJS();
        });
    </script>
</body>
</html>
